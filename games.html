<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>New Gen Gaming - Games</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">New Gen Gaming</a>
    <div>
      <a class="nav-link text-light" href="index.html">Home</a>
      <a class="nav-link text-light" href="games.html">Games</a>
      <a class="nav-link text-light" href="about.html">About</a>
    </div>
  </div>
</nav>

<section class="section-page container my-5 active-page">
  <h2 class="text-center mb-5 fw-bold text-info">Popular Games</h2>
  <div class="row g-4">

    <!-- Example Game Card -->
    <div class="col-md-4">
      <div class="game-card" onclick="openGame('Red Dead Redemption 2','An immersive western open-world experience.','https://upload.wikimedia.org/wikipedia/en/4/44/Red_Dead_Redemption_II.jpg')">
        <h4>Red Dead Redemption 2</h4>
        <p>Open-world western adventure</p>
      </div>
    </div>

    <!-- Repeat other game cards here -->

  </div>
</section>

<footer class="footer">
  © 2026 New Gen Gaming
</footer>

<!-- Game Modal -->
<div id="gameModal" class="game-modal">
  <span class="close-btn" onclick="closeGame()">×</span>
  <div class="game-modal-content">
    <img id="modalImage">
    <h3 id="modalTitle"></h3>
    <p id="modalDesc"></p>
  </div>
</div>

<script>
function openGame(title, desc, img) {
  document.getElementById("modalTitle").innerText = title;
  document.getElementById("modalDesc").innerText = desc;
  document.getElementById("modalImage").src = img;
  document.getElementById("gameModal").style.display = "flex";
}
function closeGame() {
  document.getElementById("gameModal").style.display = "none";
}
</script>

</body>
</html>
